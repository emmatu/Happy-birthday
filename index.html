<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日特调 - 平成魔女版</title>
    <style>
        body { background-color: #2b1d42; color: #fff; text-align: center; font-family: sans-serif; margin: 0; padding: 20px; }
        .cup-img { width: 80%; max-width: 300px; margin: 30px auto; border: 3px solid #ff00ff; display: block; box-shadow: 0 0 15px #ff00ff; }
        #dialog { background: rgba(0,0,0,0.8); border: 2px solid #00ff00; padding: 15px; color: #00ff00; text-align: left; min-height: 50px; margin-top: 20px; }
        .code-box { display: none; color: #ffff00; font-size: 24px; margin-top: 20px; font-weight: bold; text-shadow: 2px 2px #f00; }
    </style>
</head>
<body>
    <h2 style="color: #ff00ff; text-shadow: 2px 2px #000;">Dice 占い - 生日版</h2>
    
    <div id="target" onclick="blow()" style="font-size: 80px; cursor: pointer;">🕯️</div>

    <div id="dialog">
        [系统]: 正在接入深夜酒吧... <br>
        检测到特殊的能量源。请点击蜡烛许愿并吹灭它。
    </div>

    <div id="code-box" class="code-box">
        🎂 HAPPY BIRTHDAY! 🎂<br>
        <small style="font-size: 14px;">异世界礼品码：</small><br>
        NS-XXXX-XXXX-XXXX
    </div>

    <script>
        function blow() {
            const d = document.getElementById('dialog');
            const c = document.getElementById('code-box');
            const t = document.getElementById('target');
            t.style.filter = "brightness(0.2)";
            t.innerHTML = "🕯️";
            d.innerHTML = "[系统]: 愿望已记录。正在提取礼品码...";
            setTimeout(() => {
                d.style.display = 'none';
                c.style.display = 'block';
                document.body.style.backgroundColor = "#000";
            }, 1500);
        }
    </script>
</body>
</html>
