<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日特调 - 都市传说版</title>
    <style>
        body { background-color: #2b1d42; color: #fff; text-align: center; font-family: sans-serif; margin: 0; overflow: hidden; }
        /* 模拟 3DS 的扫描线 */
        body::after { content: ""; position: fixed; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); background-size: 100% 4px; pointer-events: none; }
        
        #main-container { padding: 20px; }
        .cup-img { width: 200px; margin-top: 50px; border: 3px solid #ff00ff; box-shadow: 0 0 15px #ff00ff; cursor: pointer; }
        
        #dialog {
            margin: 20px auto; width: 85%; background: rgba(0,0,0,0.8);
            border: 2px solid #00ff00; padding: 15px; min-height: 60px;
            color: #00ff00; font-size: 14px; text-align: left;
        }

        .code-box { display: none; color: #ffff00; font-size: 20px; margin-top: 20px; text-shadow: 2px 2px #f00; }
    </style>
</head>
<body>

<div id="main-container">
    <h2 style="color: #ff00ff;">Dice 占い - 生日版</h2>
    
    <img src="cup.jpg" class="cup-img" id="cup" onclick="blowCandle()">
    
    <div id="dialog">
        [系统]: 正在接入深夜酒吧... <br>
        检测到特殊的能量源。请点击酒杯，熄灭小熊的蜡烛。
    </div>

    <div id="code-box" class="code-box">
        🎂 HAPPY BIRTHDAY! 🎂<br>
        <small>兑换码：</small><br>
        <strong>NS-XXXX-XXXX-XXXX</strong>
    </div>
</div>

<script>
    function blowCandle() {
        const dialog = document.getElementById('dialog');
        const codeBox = document.getElementById('code-box');
        const cup = document.getElementById('cup');

        // 模拟熄灭效果
        cup.style.filter = "brightness(0.3) grayscale(1)";
        dialog.innerHTML = "[系统]: 愿望已记录。正在从异世界提取礼品码...";
        
        setTimeout(() => {
            dialog.style.display = 'none';
            codeBox.style.display = 'block';
            document.body.style.backgroundColor = "#000";
        }, 2000);
    }
</script>
</body>
</html>
