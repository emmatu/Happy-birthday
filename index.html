<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生日特调 - 兽娘红茶馆风格</title>
    <style>
        /* 兽娘红茶馆配色：暖咖、奶油白、复古粉 */
        body { background-color: #3d2b1f; color: #fdf5e6; margin: 0; padding: 0; overflow: hidden; font-family: "Zpix", "Courier New", monospace; }
        #game-container { width: 100vw; height: 100vh; position: relative; background: url('bar_bg.png') center bottom/cover; }
        
        /* 像素对话框 */
        #dialog-box {
            position: absolute; bottom: 30px; left: 5%; width: 90%; 
            background: rgba(61, 43, 31, 0.9); border: 3px solid #d4a373; 
            padding: 15px; box-sizing: border-box; min-height: 80px; z-index: 100;
        }

        /* 蜡烛选择按钮组 */
        #choice-panel {
            display: none; position: absolute; top: 40%; width: 100%; text-align: center; z-index: 200;
        }
        .candle-btn {
            display: inline-block; background: #faedcd; border: 2px solid #d4a373; 
            margin: 5px; padding: 10px; border-radius: 10px; color: #3d2b1f;
        }

        #cocktail-display { position: absolute; top: 30%; left: 50%; transform: translateX(-50%); width: 250px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <audio id="bgm" loop><source src="rain_and_lofi.mp3" type="audio/mpeg"></audio>
    <audio id="sfx-pour"><source src="pour_liquid.mp3" type="audio/mpeg"></audio>
    <audio id="sfx-blow"><source src="blow_sound.mp3" type="audio/mpeg"></audio>

    <div id="game-container">
        <img id="cocktail-display" src="empty_glass.png">

        <div id="choice-panel">
            <div class="candle-btn" onclick="selectCandle('bear')">🧸 小熊蜡烛</div>
            <div class="candle-btn" onclick="selectCandle('star')">⭐ 星星蜡烛</div>
            <div class="candle-btn" onclick="selectCandle('heart')">💗 爱心蜡烛</div>
        </div>

        <div id="dialog-box" onclick="nextStep()">
            <div id="text-content">欢迎光临，今晚是属于你的特别时刻... (点击继续)</div>
        </div>
    </div>

<script>
    let step = 0;
    const dialogText = [
        "在这个细雨绵绵的深夜，想为你调一杯甜甜的梦。",
        "先加入浓郁的奶油，还有一点点昨日的温柔... (正在倒入...)",
        "最后，请挑选一支你最喜欢的蜡烛吧。"
    ];

    function nextStep() {
        const bgm = document.getElementById('bgm');
        if(bgm.paused) bgm.play(); // 第一次点击触发音乐播放

        if (step < dialogText.length - 1) {
            step++;
            document.getElementById('text-content').innerText = dialogText[step];
            
            if(step === 1) {
                document.getElementById('sfx-pour').play(); // 播放倒酒声
                document.getElementById('cocktail-display').src = "mixing_anim.gif";
            }
            if(step === 2) {
                document.getElementById('choice-panel').style.display = 'block';
            }
        }
    }

    function selectCandle(type) {
        document.getElementById('choice-panel').style.display = 'none';
        document.getElementById('cocktail-display').src = `final_${type}.png`;
        document.getElementById('text-content').innerHTML = "蜡烛已插好。闭上眼许个愿，然后点击吹灭它。";
        
        document.getElementById('cocktail-display').onclick = function() {
            document.getElementById('sfx-blow').play();
            // 熄灭转场
            document.body.style.backgroundColor = "black";
            document.getElementById('game-container').style.opacity = "0.2";
            setTimeout(() => {
                alert("祝你生日快乐！兑换码：NS-XXXX-XXXX");
                // 这里可以替换成更有仪式感的信封弹出代码
            }, 1000);
        };
    }
</script>
</body>
</html>
